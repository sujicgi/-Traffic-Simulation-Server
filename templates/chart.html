<!DOCTYPE html>
<html>
<head>
    <title>트래픽 시뮬레이션 결과</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>응답시간 그래프</h1>

<canvas id="responseChart"></canvas>

<script>

fetch('/results')
.then(response => response.json())
.then(data => {

    let labels = [];
    let responseTimes = [];

    data.forEach(row => {

        labels.push(row[0]);      // users
        responseTimes.push(row[2]); // response_time

    });

    new Chart(
        document.getElementById('responseChart'),
        {
            type: 'bar',

            data: {
                labels: labels,

                datasets: [{
                    label: '응답시간',

                    data: responseTimes
                }]
            }
        }
    );

});

</script>

</body>
</html>
